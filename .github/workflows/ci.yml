name: Test, Build & Deploy
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate stack YAML
        run: |
          pip install pyyaml
          for f in stacks/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "✅ $f" || exit 1
          done
