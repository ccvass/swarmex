  <!-- Text: SWARM in gradient, EX in dark -->
  <text x="155" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="url(#g1)">SWARM</text>
  <text x="335" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#1F2937">EX</text>

  <!-- Tagline -->
  <text x="155" y="90" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" letter-spacing="2">ENTERPRISE ORCHESTRATION</text>
