global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter (host metrics)
  - job_name: "node-exporter"
    dns_sd_configs:
      - names: ["tasks.node-exporter"]
        type: A
        port: 9100

  # cAdvisor (container metrics)
  - job_name: "cadvisor"
    dns_sd_configs:
      - names: ["tasks.cadvisor"]
        type: A
        port: 8080

  # Traefik metrics
  - job_name: "traefik"
    dns_sd_configs:
      - names: ["tasks.traefik"]
        type: A
        port: 8080

  # Swarmex controllers
  - job_name: "swarmex"
    dns_sd_configs:
      - names:
          - "tasks.event-controller"
          - "tasks.scaler"
          - "tasks.gatekeeper"
          - "tasks.remediation"
          - "tasks.deployer"
          - "tasks.vault-sync"
          - "tasks.operator-db"
          - "tasks.nano-mesh"
        type: A
        port: 8080
    metrics_path: /metrics
