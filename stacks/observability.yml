version: "3.8"

# Observability stack for Swarmex
# Pre-req: run scripts/pre-deploy.sh first
# Deploy: docker stack deploy -c stacks/observability.yml observability

configs:
  prometheus_config:
    file: ../configs/prometheus/prometheus.yml
  prometheus_alerts:
    file: ../configs/prometheus/alerts.yml
  loki_config:
    file: ../configs/loki/config.yaml
  tempo_config:
    file: ../configs/tempo/config.yaml

services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_alerts
        target: /etc/prometheus/alerts.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_pw
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN:-localhost}
    secrets:
      - grafana_admin_pw
    deploy:
      mode: replicated
      replicas: 1
      labels:
        traefik.enable: "true"
        traefik.http.routers.grafana.rule: "Host(`grafana.${DOMAIN:-localhost}`)"
        traefik.http.routers.grafana.tls.certresolver: "le"
        traefik.http.services.grafana.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring
      - traefik-public

  loki:
    image: grafana/loki:latest
    volumes:
      - loki_data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.6.1  # 2.7+ requires Kafka, see docs/FORK-STATUS.md
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml
    command: ["-config.file=/etc/tempo.yaml"]
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - alertmanager_data:/alertmanager
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      mode: global
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      mode: global
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

secrets:
  grafana_admin_pw:
    external: true

networks:
  monitoring:
    external: true
  traefik-public:
    external: true
