version: '3.8'
configs:
  prometheus_config:
    file: ../configs/prometheus/prometheus.yml
  prometheus_alerts:
    file: ../configs/prometheus/alerts.yml
  loki_config:
    file: ../configs/loki/config.yaml
  tempo_config:
    file: ../configs/tempo/config.yaml
services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
    - prometheus_data:/prometheus
    configs:
    - source: prometheus_config
      target: /etc/prometheus/prometheus.yml
    - source: prometheus_alerts
      target: /etc/prometheus/alerts.yml
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.retention.time=15d
    - --web.enable-lifecycle
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      resources:
        limits:
          memory: 2G
      labels:
        team: platform
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:9090/-/healthy 2>/dev/null || curl -sf http://localhost:9090/-/healthy
        2>/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - monitoring
  grafana:
    image: grafana/grafana:latest
    volumes:
    - grafana_data:/var/lib/grafana
    environment:
    - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_pw
    - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN:-localhost}
    secrets:
    - grafana_admin_pw
    deploy:
      mode: replicated
      replicas: 1
      labels:
        traefik.enable: 'true'
        traefik.http.routers.grafana.rule: Host(`grafana.${DOMAIN:-localhost}`)
        traefik.http.routers.grafana.tls.certresolver: le
        traefik.http.services.grafana.loadbalancer.server.port: '3000'
        team: platform
      resources:
        limits:
          memory: 256M
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:3000/api/health 2>/dev/null || curl -sf http://localhost:3000/api/health
        2>/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - monitoring
    - traefik-public
  loki:
    image: grafana/loki:latest
    volumes:
    - loki_data:/loki
    configs:
    - source: loki_config
      target: /etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
      labels:
        team: platform
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:3100/ready 2>/dev/null || curl -sf http://localhost:3100/ready
        2>/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - monitoring
  tempo:
    image: grafana/tempo:2.6.1
    configs:
    - source: tempo_config
      target: /etc/tempo.yaml
    command:
    - -config.file=/etc/tempo.yaml
    deploy:
      mode: replicated
      replicas: 1
      labels:
        team: platform
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:3200/ready 2>/dev/null || curl -sf http://localhost:3200/ready
        2>/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - monitoring
  alertmanager:
    image: prom/alertmanager:latest
    volumes:
    - alertmanager_data:/alertmanager
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      labels:
        team: platform
      resources:
        limits:
          memory: 256M
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:9093/-/healthy 2>/dev/null || curl -sf http://localhost:9093/-/healthy
        2>/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      mode: global
      labels:
        team: platform
      resources:
        limits:
          memory: 128M
    networks:
    - monitoring
  node-exporter:
    image: prom/node-exporter:latest
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    deploy:
      mode: global
      labels:
        team: platform
      resources:
        limits:
          memory: 64M
    networks:
    - monitoring
volumes:
  prometheus_data: null
  grafana_data: null
  loki_data: null
  alertmanager_data: null
secrets:
  grafana_admin_pw:
    external: true
networks:
  monitoring:
    external: true
  traefik-public:
    external: true
