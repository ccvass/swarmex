version: "3.8"

# Security stack for Swarmex
# Deploy: docker stack deploy -c stacks/security.yml security

services:
  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY__FILE=/run/secrets/authentik_secret
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=authentik-db
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD__FILE=/run/secrets/authentik_db_pw
    secrets:
      - authentik_secret
      - authentik_db_pw
    deploy:
      mode: replicated
      replicas: 1
      labels:
        traefik.enable: "true"
        traefik.http.routers.authentik.rule: "Host(`auth.${DOMAIN:-localhost}`)"
        traefik.http.routers.authentik.tls.certresolver: "le"
        traefik.http.services.authentik.loadbalancer.server.port: "9000"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - security
      - traefik-public

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    command: worker
    environment:
      - AUTHENTIK_SECRET_KEY__FILE=/run/secrets/authentik_secret
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=authentik-db
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD__FILE=/run/secrets/authentik_db_pw
    secrets:
      - authentik_secret
      - authentik_db_pw
    deploy:
      mode: replicated
      replicas: 1
    networks:
      - security

  authentik-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=authentik
      - POSTGRES_DB=authentik
      - POSTGRES_PASSWORD_FILE=/run/secrets/authentik_db_pw
    secrets:
      - authentik_db_pw
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - security

  authentik-redis:
    image: redis:7-alpine
    volumes:
      - authentik_redis_data:/data
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - security

  openbao:
    image: openbao/openbao:latest
    command: server
    environment:
      - BAO_LOCAL_CONFIG={"storage":{"raft":{"path":"/bao/data"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":true}},"api_addr":"http://openbao:8200","cluster_addr":"http://openbao:8201","ui":true}
    volumes:
      - openbao_data:/bao/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      labels:
        traefik.enable: "true"
        traefik.http.routers.openbao.rule: "Host(`vault.${DOMAIN:-localhost}`)"
        traefik.http.routers.openbao.tls.certresolver: "le"
        traefik.http.services.openbao.loadbalancer.server.port: "8200"
    healthcheck:
      test: ["CMD", "bao", "status", "-format=json"]
      interval: 15s
      timeout: 5s
      retries: 3
    cap_add:
      - IPC_LOCK
    networks:
      - security
      - traefik-public

volumes:
  authentik_db_data:
  authentik_redis_data:
  openbao_data:

secrets:
  authentik_secret:
    external: true
  authentik_db_pw:
    external: true

networks:
  security:
    driver: overlay
    attachable: true
  traefik-public:
    external: true
