version: "3.8"

# Swarmex controllers stack
# Deploy: docker stack deploy -c stacks/swarmex.yml swarmex
# Requires: observability, ingress stacks deployed first

services:
  event-controller:
    image: registry.labtau.com/ccvass/swarmex/swarmex-event-controller:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex

  scaler:
    image: registry.labtau.com/ccvass/swarmex/swarmex-scaler:latest
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex
      - monitoring

  gatekeeper:
    image: registry.labtau.com/ccvass/swarmex/swarmex-gatekeeper:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex
      - traefik-public

  remediation:
    image: registry.labtau.com/ccvass/swarmex/swarmex-remediation:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex
      - monitoring

  deployer:
    image: registry.labtau.com/ccvass/swarmex/swarmex-deployer:latest
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      labels:
        traefik.enable: "true"
        traefik.http.routers.deployer.rule: "Host(`deploy.${DOMAIN:-localhost}`)"
        traefik.http.routers.deployer.tls.certresolver: "le"
        traefik.http.services.deployer.loadbalancer.server.port: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex
      - monitoring
      - traefik-public

  vault-sync:
    image: registry.labtau.com/ccvass/swarmex/swarmex-vault-sync:latest
    environment:
      - VAULT_ADDR=http://openbao:8200
      - VAULT_TOKEN_FILE=/run/secrets/vault_token
    secrets:
      - vault_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - swarmex_secrets:/run/secrets/swarmex
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex
      - security

  operator-db:
    image: registry.labtau.com/ccvass/swarmex/swarmex-operator-db:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex

  nano-mesh:
    image: registry.labtau.com/ccvass/swarmex/swarmex-nano-mesh:latest
    environment:
      - EASYTIER_PEER=${EASYTIER_PEER:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - swarmex

volumes:
  swarmex_secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

secrets:
  vault_token:
    external: true

networks:
  swarmex:
    driver: overlay
    attachable: true
  monitoring:
    external: true
  traefik-public:
    external: true
  security:
    external: true
