version: "3.8"

# Ingress stack for Swarmex using Traefik-XPX
# Compatible with legacy Traefik 2.x label patterns
#
# Deploy:
#   CF_API_EMAIL=you@example.com CF_API_KEY=your-key \
#   docker stack deploy -c stacks/ingress.yml traefik
#
# Prerequisites:
#   - Shared mount on manager nodes with:
#       /data/swarmex/traefik/certs/          (acme.json — auto-generated)
#       /data/swarmex/traefik/logs/           (traefik.log)
#       /data/swarmex/traefik/fileprovider/   (dynamic.yml — TLS options)
#       /data/swarmex/traefik/traefik-xp.yml  (main config file)
#       /data/swarmex/traefik/users.json      (dashboard auth users)

services:
  traefik:
    image: ghcr.io/ccvass/traefik-xpx:latest
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL:-admin@example.com}
      - CF_API_KEY=${CF_API_KEY:-changeme}
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 8099
        published: 8099
        protocol: tcp
        mode: ingress
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${TRAEFIK_DATA:-/data/swarmex/traefik}/certs:/certificates
      - ${TRAEFIK_DATA:-/data/swarmex/traefik}/logs:/var/log
      - ${TRAEFIK_DATA:-/data/swarmex/traefik}/fileprovider:/fileprovider
      - ${TRAEFIK_DATA:-/data/swarmex/traefik}/traefik-xp.yml:/etc/traefik/traefik.yml
      - ${TRAEFIK_DATA:-/data/swarmex/traefik}/users.json:/etc/traefik/users.json
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
        preferences:
          - spread: node.id
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        traefik.enable: "true"
        traefik.constraint-label: "traefik-public"
        traefik.docker.network: "traefik-public"
        traefik.http.middlewares.https-redirect.redirectscheme.scheme: "https"
        traefik.http.routers.traefik-public.rule: "Host(`${TRAEFIK_DOMAIN:-traefik.example.com}`)"
        traefik.http.routers.traefik-public.service: "api@internal"
        traefik.http.routers.traefik-public.tls: "true"
        traefik.http.routers.traefik-public.tls.certresolver: "le"
        traefik.http.services.traefik-public.loadbalancer.server.port: "8080"
        team: platform
    logging:
      driver: json-file
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
