version: "3.8"

# Ingress stack for Swarmex using Traefik-XPX
# Deploy: ACME_EMAIL=admin@example.com docker stack deploy -c stacks/ingress.yml ingress
#
# Prerequisites:
#   - Docker secret 'cloudflare_api_token' (for DNS challenge SSL)
#   - Shared mount directories on all manager nodes:
#       mkdir -p /mnt/traefik/{certificates,config,logs,valkey}
#   - Dynamic config file at /mnt/traefik/config/dynamic.yml (optional)

services:
  traefik:
    image: ghcr.io/ccvass/traefik-xpx:latest
    command:
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --entrypoints.traefik.address=:8099
      - --api.dashboard=true
      - --api.valkeyUrl=valkey://valkey:6379
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.le.acme.storage=/certificates/acme.json
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --metrics.prometheus=true
      - --ping.entryPoint=http
      - --accesslog
      - --log.filepath=/var/log/traefik/traefik.log
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 8099
        published: 8099
        protocol: tcp
        mode: ingress
    secrets:
      - cloudflare_api_token
    environment:
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cloudflare_api_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TRAEFIK_DATA:-/mnt/traefik}/certificates:/certificates
      - ${TRAEFIK_DATA:-/mnt/traefik}/config:/etc/traefik
      - ${TRAEFIK_DATA:-/mnt/traefik}/logs:/var/log/traefik
    deploy:
      mode: global
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
      labels:
        team: platform
        traefik.enable: "true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - traefik-public
      - monitoring

  valkey:
    image: valkey/valkey:9-alpine
    command: valkey-server --appendonly yes
    volumes:
      - ${TRAEFIK_DATA:-/mnt/traefik}/valkey:/data
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          memory: 256M
      labels:
        team: platform
    networks:
      - traefik-public

secrets:
  cloudflare_api_token:
    external: true

networks:
  traefik-public:
    external: true
  monitoring:
    external: true
