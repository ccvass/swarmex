version: '3.8'

# Tools stack using Swarmpit XPX (embedded SQLite, no external DB)
# Deploy: docker stack deploy -c stacks/tools-swarmpit.yml tools
#
# Prerequisites:
#   - Shared mount directory on manager nodes:
#       mkdir -p /data/swarmex/swarmpit
#   - Traefik running with 'traefik-public' network

configs:
  swarmcd_repos:
    file: ../configs/swarmcd/repos.yaml
  swarmcd_stacks:
    file: ../configs/swarmcd/stacks.yaml

services:
  swarmpit:
    image: ghcr.io/ccvass/swarmpit-xpx:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${SWARMPIT_DATA:-/mnt/swarmpit-xpx}:/app/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        traefik.enable: "true"
        traefik.docker.network: "traefik-public"
        traefik.constraint-label: "traefik-public"
        traefik.http.routers.swarmpit-http.rule: "Host(`${SWARMPIT_DOMAIN:-swarmpit.example.com}`)"
        traefik.http.routers.swarmpit-http.entrypoints: "http"
        traefik.http.routers.swarmpit-http.middlewares: "https-redirect"
        traefik.http.routers.swarmpit-https.rule: "Host(`${SWARMPIT_DOMAIN:-swarmpit.example.com}`)"
        traefik.http.routers.swarmpit-https.entrypoints: "https"
        traefik.http.routers.swarmpit-https.tls: "true"
        traefik.http.routers.swarmpit-https.tls.certresolver: "le"
        traefik.http.services.swarmpit.loadbalancer.server.port: "8080"
        team: platform
      resources:
        limits:
          memory: 1G
    networks:
      - traefik-public
      - swarmpit-internal

  swarmpit-agent:
    image: swarmpit/agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOCKER_API_VERSION=1.35
      - EVENT_ENDPOINT=http://swarmpit:8080/events
      - HEALTH_CHECK_ENDPOINT=http://swarmpit:8080/version
    deploy:
      mode: global
      labels:
        team: platform
      resources:
        limits:
          memory: 128M
    networks:
      - swarmpit-internal

  swarm-cd:
    image: ghcr.io/m-adawi/swarm-cd:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: swarmcd_repos
        target: /app/repos.yaml
      - source: swarmcd_stacks
        target: /app/stacks.yaml
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        team: platform
      resources:
        limits:
          memory: 256M

  swarm-cronjob:
    image: crazymax/swarm-cronjob:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=info
      - LOG_JSON=true
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        team: platform
      resources:
        limits:
          memory: 256M

  gantry:
    image: shizunge/gantry:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GANTRY_SLEEP_SECONDS=300
      - GANTRY_LOG_LEVEL=INFO
      - GANTRY_LOG_FORMAT=json
      - GANTRY_CLEANUP_IMAGES=true
      - GANTRY_ROLLBACK_ON_FAILURE=true
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        gantry.services.excluded: "true"
        team: platform
      resources:
        limits:
          memory: 256M

networks:
  traefik-public:
    external: true
  swarmpit-internal:
